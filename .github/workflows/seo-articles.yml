name: Generate SEO articles

on:
  workflow_dispatch:
    inputs:
      max_matches:
        description: "Number of matches"
        required: false
        default: "4"
      max_topics_per_match:
        description: "Topics per match"
        required: false
        default: "2"
      min_article_words:
        description: "Minimum article words"
        required: false
        default: "650"
  schedule:
    - cron: "35 */8 * * *"

permissions:
  contents: write

concurrency:
  group: seo-articles-main
  cancel-in-progress: false

jobs:
  generate-seo-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Rebase on latest main
        working-directory: .
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Generate SEO articles
        run: npm run seo:articles
        env:
          MAX_MATCHES: ${{ github.event.inputs.max_matches || '4' }}
          MAX_TOPICS_PER_MATCH: ${{ github.event.inputs.max_topics_per_match || '2' }}
          MIN_ARTICLE_WORDS: ${{ github.event.inputs.min_article_words || '650' }}
          MAX_ARTICLE_ATTEMPTS: "3"
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_AI_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_AI_ACCOUNT_ID }}
          CLOUDFLARE_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_API_TOKEN }}
          CLOUDFLARE_AI_MODEL: ${{ secrets.CLOUDFLARE_AI_MODEL }}

      - name: Rebase before commit
        working-directory: .
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Commit generated SEO articles
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate SEO article pages
          file_pattern: site/analysis.html site/articles/*.html site/articles/articles.json