name: Generate evergreen articles

on:
  workflow_dispatch:
    inputs:
      max_topics:
        description: "Number of evergreen topics"
        required: false
        default: "2"
      min_article_words:
        description: "Minimum article words"
        required: false
        default: "650"
  schedule:
    - cron: "20 9 * * 1,4"

permissions:
  contents: write

jobs:
  generate-evergreen-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Generate evergreen articles
        run: npm run evergreen:articles
        env:
          MAX_TOPICS: ${{ github.event.inputs.max_topics || '2' }}
          MIN_ARTICLE_WORDS: ${{ github.event.inputs.min_article_words || '650' }}
          MAX_ARTICLE_ATTEMPTS: "3"
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_AI_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_AI_ACCOUNT_ID }}
          CLOUDFLARE_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_API_TOKEN }}
          CLOUDFLARE_AI_MODEL: ${{ secrets.CLOUDFLARE_AI_MODEL }}

      - name: Commit evergreen articles
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate evergreen World Cup articles
          file_pattern: site/articles/*.html