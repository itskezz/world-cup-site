# .github/workflows/previews.yml
name: Generate previews

on:
  workflow_dispatch:
  schedule:
    - cron: "25 */8 * * *"

permissions:
  contents: write

jobs:
  generate-previews:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate previews
        run: npm run preview:generate
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_AI_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_AI_ACCOUNT_ID }}
          CLOUDFLARE_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_API_TOKEN }}
          CLOUDFLARE_AI_MODEL: ${{ secrets.CLOUDFLARE_AI_MODEL }}

      - name: Commit generated previews
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate match preview pages
          file_pattern: site/analysis.html site/articles/*.html