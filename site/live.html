<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Live World Cup Match Center | AI Football Predictor</title>
  <meta name="description" content="Live World Cup scores, kickoff countdowns, match status, venues, and AI-powered match context.">
  <link rel="stylesheet" href="./assets/css/main.css">
  <script type="module" src="./assets/js/common.js"></script>
  <script type="module" src="./assets/js/live.js"></script>
</head>
<body>
  <header class="site-header" data-site-header></header>

  <main class="page-shell">
    <section class="page-title sport-title">
      <p class="eyebrow">Live Match Center</p>
      <h1>World Cup Scores, Kickoffs & Match Status</h1>
      <p>Live match cards refresh from Supabase. GitHub Actions keeps the database synced from the football data provider.</p>
    </section>

    <section class="live-summary">
      <article>
        <span>Live</span>
        <strong data-live-count>0</strong>
      </article>
      <article>
        <span>Upcoming</span>
        <strong data-upcoming-count>0</strong>
      </article>
      <article>
        <span>Finished</span>
        <strong data-finished-count>0</strong>
      </article>
      <article>
        <span>Updated</span>
        <strong data-last-updated>Waiting</strong>
      </article>
    </section>

    <section class="toolbar">
      <button class="button secondary" type="button" data-refresh-live>Refresh</button>
      <span class="status-pill" data-live-status>Waiting for data</span>
    </section>

    <section class="match-list upgraded-live-list" data-live-matches>
      <article class="empty-state">Live match data will appear after Supabase is connected.</article>
    </section>
  </main>

  <footer class="site-footer" data-site-footer></footer>
</body>
</html>
